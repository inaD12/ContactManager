<h2>Contacts</h2>

<p-table
  #dt
  [value]="contacts()"
  [lazy]="true"
  (onLazyLoad)="loadContactsLazy($event)"
  [paginator]="true"
  [rows]="filters.pageSize"
  [totalRecords]="totalRecords()"
  [loading]="loading()"
  sortMode="single"
>

  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="firstName">
        First Name
        <p-sortIcon field="firstName"></p-sortIcon>
      </th>

      <th pSortableColumn="surname">
        Surname
        <p-sortIcon field="surname"></p-sortIcon>
      </th>

      <th pSortableColumn="dateOfBirth">
        Date of birth
        <p-sortIcon field="dateOfBirth"></p-sortIcon>
      </th>

      <th pSortableColumn="phoneNumber">
        Phone
        <p-sortIcon field="phoneNumber"></p-sortIcon>
      </th>

      <th pSortableColumn="address">
        Address
        <p-sortIcon field="address"></p-sortIcon>
      </th>

      <th>IBAN</th>
    </tr>

    <tr>
      <th>
        <input
          pInputText
          placeholder="Search first name"
          (input)="onFilter('firstName', $any($event.target).value)"
        />
      </th>

      <th>
        <input
          pInputText
          placeholder="Search surname"
          (input)="onFilter('surname', $any($event.target).value)"
        />
      </th>

      <th>
        <input
            pInputText
            type="date"
            placeholder="From"
            (change)="onDateFilter('minDateOfBirth', $any($event.target).value)"
        />

        <input
            pInputText
            type="date"
            placeholder="To"
            (change)="onDateFilter('maxDateOfBirth', $any($event.target).value)"
            style="margin-top: 4px;"
        />
      </th>

      <th>
        <input
          pInputText
          placeholder="Search phone"
          (input)="onFilter('phoneNumber', $any($event.target).value)"
        />
      </th>

      <th>
        <input
          pInputText
          placeholder="Search address"
          (input)="onFilter('address', $any($event.target).value)"
        />
      </th>

      <th></th>
    </tr>
  </ng-template>

  <ng-template pTemplate="body" let-contact>
    <tr>
      <td>{{ contact.firstName }}</td>
      <td>{{ contact.surname }}</td>
      <td>{{ contact.dateOfBirth | date:'mediumDate' }}</td>
      <td>{{ contact.phoneNumber }}</td>
      <td>{{ contact.address }}</td>
      <td>{{ contact.iban }}</td>
    </tr>
  </ng-template>

  <ng-template pTemplate="loadingbody">
    @for (row of [1,2,3,4,5]; track row) {
        <tr>
        <td><p-skeleton width="100%"></p-skeleton></td>
        <td><p-skeleton width="100%"></p-skeleton></td>
        <td><p-skeleton width="100%"></p-skeleton></td>
        <td><p-skeleton width="100%"></p-skeleton></td>
        <td><p-skeleton width="100%"></p-skeleton></td>
        <td><p-skeleton width="100%"></p-skeleton></td>
        </tr>
    }
  </ng-template>

</p-table>
